# ── Render Blueprint ──────────────────────────────────────────
# Deploy: Dashboard → New → Blueprint → connect this repo
# Docs: https://docs.render.com/blueprint-spec

services:
  - type: web
    name: lumin-guide-api
    runtime: node
    region: oregon                # or singapore, frankfurt, ohio
    plan: free                    # free | starter | standard
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: MONGODB_URI
        sync: false               # you'll set this manually in dashboard
      - key: JWT_SECRET
        generateValue: true        # Render generates a random value
      - key: JWT_EXPIRES_IN
        value: "7d"
      - key: CORS_ORIGIN
        sync: false               # set to your Cloudflare Pages URL
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        value: lumin-guide-assets
      - key: R2_PUBLIC_URL
        sync: false
